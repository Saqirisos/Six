<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Six</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="enter-screen">
  <h1>bem vindo ao inferno</h1>
</div>

<div class="bg"></div>

<div class="center">

  <img src="pfp.png" class="pfp">

  <h1>Six</h1>

  <p class="bio">
    eu ainda penso<br>
    mas já não digo mais nada
  </p>

  <p class="about">
    só aprendi a lidar com o que ficou
  </p>

  <div class="icons">
    <a href="https://open.spotify.com/user/s3q266mq8jbsca79dc3tbyz3j" target="_blank">
      <img src="spotify.png" class="icon">
    </a>

    <a href="https://discord.com/users/1038593406148038778" target="_blank">
      <img src="discord.png" class="icon">
    </a>
  </div>

  <div class="spotify-card" id="card">
    carregando...
  </div>

</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<script>
const USER_ID = "1038593406148038778";

const enter = document.getElementById("enter-screen");
const music = document.getElementById("music");
const card = document.getElementById("card");

enter.onclick = async () => {
  enter.classList.add("hide");
  try {
    music.volume = 0.4;
    await music.play();
  } catch {}
};

async function update() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
    const data = await res.json();

    if (data.success && data.data.listening_to_spotify) {
      const s = data.data.spotify;

      card.innerHTML = `
        <b>♫ ouvindo agora</b><br>
        ${s.song}<br>
        <span>${s.artist}</span>
      `;
    } else {
      card.innerText = "não estou ouvindo nada agora";
    }
  } catch {
    card.innerText = "erro ao carregar";
  }
}

update();
setInterval(update, 5000);
</script>

</body>
</html>
