<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Six</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="enter-screen">
    <div class="enter-box">
      <h1 id="enter-title">bem vindo ao inferno</h1>
      <p id="enter-subtitle">click to enter</p>
    </div>
  </div>

  <div class="bg"></div>
  <div class="dark-overlay"></div>

  <main class="center">
    <img src="pfp.png" class="pfp" />

    <h1 id="name">Six</h1>

    <p id="bio" class="bio"></p>
    <p id="about" class="about"></p>

    <div class="buttons">
      <a id="spotify-link" class="btn" target="_blank">Spotify</a>
      <a id="discord-link" class="btn" target="_blank">Discord</a>
    </div>

    <section class="spotify-card">
      <div class="spotify-icon">♫</div>
      <div>
        <h3 id="spotify-title">Spotify</h3>
        <p id="spotify-desc">sixconsumed</p>
      </div>
    </section>
  </main>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
